apiVersion: v1
kind: Pod
metadata:
  name: host-topo-job
spec:
  nodeName: "<node-name>"  # <-- *** CHANGE THIS to your node name ***
  hostNetwork: true
  restartPolicy: Never

  terminationGracePeriodSeconds: 0

  volumes:
  - name: output-volume
    emptyDir: {}
  - name: host-sys
    hostPath:
      path: /sys
      type: Directory
  
  containers:
  - name: topo-vis-container
    image: ghcr.io/rajkiranjoshi/host-topo-vis:latest
    securityContext:
      privileged: true
    volumeMounts:
    - name: output-volume
      mountPath: /output
    - name: host-sys
      mountPath: /sys
      readOnly: true
  # This is a helper container that will wait for the topo-vis-container to finish and 
  # then allow copying the output files to the client.
  - name: helper-container
    image: quay.io/quay/busybox:latest
    volumeMounts:
    - name: output-volume
      mountPath: /output
    command: ["/bin/sleep", "3600"]
  